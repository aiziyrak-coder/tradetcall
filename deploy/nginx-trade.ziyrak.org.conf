# Frontend — trade.ziyrak.org (faqat yangi sayt, boshqalarga tegmaydi)
server {
    listen 80;
    listen [::]:80;
    server_name trade.ziyrak.org;

    root /opt/trade/dist-web;
    index index.html;

    client_max_body_size 4m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
