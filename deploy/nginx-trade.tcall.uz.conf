# Frontend — trade.tcall.uz (boshqa saytlarga tegmaydi)
server {
    listen 80;
    listen [::]:80;
    server_name trade.tcall.uz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name trade.tcall.uz;

    ssl_certificate /etc/letsencrypt/live/trade.tcall.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trade.tcall.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/tradetcall/dist-web;
    index index.html;

    client_max_body_size 4m;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
